<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Dashboard Pro - v8.0 (Firebase)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCQvF990R2rztUtyPUVb1csA0PU-j38X2g",
            authDomain: "churn-8a3e7.firebaseapp.com",
            projectId: "churn-8a3e7",
            storageBucket: "churn-8a3e7.firebasestorage.app",
            messagingSenderId: "476195568751",
            appId: "1:476195568751:web:2d28a44ab093c2f114a19a"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // Exponer Firebase al scope global
        window.db = db;
        window.collection = collection;
        window.getDocs = getDocs;
        window.addDoc = addDoc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.query = query;
        window.orderBy = orderBy;
        window.auth = auth;
        window.signInAnonymously = signInAnonymously;
        
        // Iniciar autenticación
        signInAnonymously(auth)
            .then(() => {
                console.log("Autenticación exitosa");
                document.getElementById('sync-status').innerHTML = '✅ Conectado a Firebase';
                if(window.cargarDesdeFirebase) window.cargarDesdeFirebase();
            })
            .catch((error) => {
                console.error("Error de autenticación:", error);
                document.getElementById('sync-status').innerHTML = '❌ Error de conexión - Revisa reglas de Firebase';
            });
    </script>
    
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --bg: #f8fafc; --dark: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; flex-wrap: wrap; cursor: pointer; }
        .tab-btn { padding: 12px 24px; border: none; background: none; font-weight: 600; color: var(--secondary); transition: 0.3s; cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .content { display: none; animation: fadeIn 0.3s; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .registro-vertical { max-width: 500px; background: #f8fafc; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .form-section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #e2e8f0; }
        .form-section:last-child { border-bottom: none; }
        .section-title { font-weight: bold; color: var(--primary); margin-bottom: 10px; display: block; font-size: 14px; text-transform: uppercase; }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .input-row { display: flex; align-items: center; gap: 10px; }
        .input-row label { min-width: 60px; font-size: 13px; color: var(--secondary); }
        
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--primary); }

        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center;}
        .btn-primary { background: var(--primary); color: white; width: 100%; max-width: 500px; }
        .btn-success { background: var(--success); color: white; }
        .btn-export { background: #475569; color: white; }

        .table-container { overflow-x: auto; max-height: 500px; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1000px; }
        thead th { position: sticky; top: 0; background: var(--dark); color: white; padding: 15px; z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .goal-tag { font-size: 11px; color: #64748b; background: #f1f5f9; padding: 2px 6px; border-radius: 10px; }

        .chart-container { margin-top: 20px; height: 500px; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        
        .loading { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000; }
        .sync-status { font-size: 12px; color: var(--success); margin-top: 5px; }
        .action-buttons { display: flex; gap: 5px; justify-content: center; }
        .edit-btn { background: var(--primary); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .delete-btn { background: var(--danger); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        
        .metric-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .metric-btn { padding: 10px 20px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .metric-btn.active { background: var(--primary); color: white; }
        
        .filter-group { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-item { display: flex; flex-direction: column; gap: 5px; }
        .filter-item label { font-size: 12px; font-weight: bold; color: var(--secondary); }
        .filter-item select, .filter-item input { width: 150px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <div>
            <h1 style="margin:0; color: var(--primary);">KPI Dashboard Pro</h1>
            <p style="margin:0; color: var(--secondary);">Registro y Análisis de Cierre (Firebase)</p>
            <div class="sync-status" id="sync-status">🔄 Conectando a Firebase...</div>
        </div>
        <button class="btn btn-export" id="btnExportar">📥 Exportar Respaldo</button>
    </div>
    
    <div class="tabs" id="tabs">
        <button class="tab-btn active" data-tab="registro">📝 Registro Diario</button>
        <button class="tab-btn" data-tab="importar">🗄️ Base de Datos</button>
        <button class="tab-btn" data-tab="comparativa">📊 Comparativa de Periodos</button>
        <button class="tab-btn" data-tab="analisis">📈 Análisis por Métrica</button>
    </div>

    <!-- Pestaña Registro -->
    <div id="registro" class="content active">
        <div class="registro-vertical">
            <div class="form-section">
                <label class="section-title">📅 Fecha de Registro</label>
                <input type="date" id="reg-fecha">
                <small style="color: var(--secondary);">✨ Al seleccionar fecha, se autocompletan las metas del último registro</small>
            </div>

            <div class="form-section">
                <label class="section-title">🏗️ Instalaciones</label>
                <div class="input-group">
                    <div class="input-row"><label>Real:</label><input type="number" id="r-inst" placeholder="0"></div>
                    <div class="input-row"><label>Meta:</label><input type="number" id="m-inst" placeholder="0"></div>
                </div>
            </div>

            <div class="form-section">
                <label class="section-title">📈 Crecimiento</label>
                <div class="input-group">
                    <div class="input-row"><label>Real:</label><input type="number" id="r-crec" placeholder="0"></div>
                    <div class="input-row"><label>Meta:</label><input type="number" id="m-crec" placeholder="0"></div>
                </div>
            </div>

            <div class="form-section">
                <label class="section-title">⚠️ Bajas</label>
                <div class="input-group">
                    <div class="input-row"><label>Real:</label><input type="number" id="r-bajas" placeholder="0"></div>
                    <div class="input-row"><label>Meta:</label><input type="number" id="m-bajas" placeholder="0"></div>
                </div>
            </div>

            <div class="form-section">
                <label class="section-title">📉 Clientes Perdidos</label>
                <div class="input-group">
                    <div class="input-row"><label>Real:</label><input type="number" id="r-perd" placeholder="0"></div>
                    <div class="input-row"><label>Meta:</label><input type="number" id="m-perd" placeholder="0"></div>
                </div>
            </div>
        </div>
        <button class="btn btn-primary" id="btnGuardar">💾 Guardar en Firebase</button>
    </div>

    <!-- Pestaña Base de Datos -->
    <div id="importar" class="content">
        <div style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <input type="file" id="excel-file" accept=".xlsx, .xls">
            <strong id="contador-filas">0 Registros</strong>
            <button class="btn btn-success" id="btnCargar">🔄 Cargar desde Firebase</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Instalaciones</th>
                        <th>Crecimiento</th>
                        <th>Bajas</th>
                        <th>Clientes Perdidos</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla"></tbody>
            </table>
        </div>
    </div>

    <!-- Pestaña Comparativa de Periodos -->
    <div id="comparativa" class="content">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f8fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
            <div class="form-group"><label>Comparar por:</label>
                <select id="tipo-comp">
                    <option value="dia">Día Exacto</option>
                    <option value="mes">Mes (Cierre)</option>
                    <option value="año">Año (Cierre)</option>
                </select>
            </div>
            <div class="form-group"><label>Periodo A:</label>
                <input type="date" id="fecha-a" class="in-dia">
                <input type="month" id="mes-a" class="in-mes" style="display:none">
                <input type="number" id="año-a" class="in-año" placeholder="2026" style="display:none">
            </div>
            <div class="form-group"><label>Periodo B:</label>
                <input type="date" id="fecha-b" class="in-dia">
                <input type="month" id="mes-b" class="in-mes" style="display:none">
                <input type="number" id="año-b" class="in-año" placeholder="2025" style="display:none">
            </div>
        </div>
        <button class="btn btn-success" id="btnComparar" style="width:100%">📊 Comparar Cierres de Periodo</button>
        <div class="chart-container">
            <canvas id="graficaComparativa"></canvas>
        </div>
    </div>

    <!-- Pestaña Análisis por Métrica -->
    <div id="analisis" class="content">
        <div class="metric-buttons" id="metricButtons">
            <button class="metric-btn active" data-metrica="instalaciones">🏗️ Instalaciones</button>
            <button class="metric-btn" data-metrica="crecimiento">📈 Crecimiento</button>
            <button class="metric-btn" data-metrica="bajas">⚠️ Bajas</button>
            <button class="metric-btn" data-metrica="perdidos">📉 Clientes Perdidos</button>
        </div>
        
        <div class="filter-group">
            <div class="filter-item">
                <label>Agrupar por:</label>
                <select id="agrupacion">
                    <option value="dia">Día</option>
                    <option value="mes" selected>Mes</option>
                    <option value="año">Año</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Período específico:</label>
                <select id="periodoSelector">
                    <option value="todo">Todo el historial</option>
                    <option value="año">Año específico</option>
                    <option value="rango">Rango de fechas</option>
                </select>
            </div>
            <div class="filter-item" id="añoSelector" style="display:none;">
                <label>Año:</label>
                <input type="number" id="añoFiltro">
            </div>
            <div class="filter-item" id="rangoSelector" style="display:none;">
                <label>Desde:</label>
                <input type="date" id="fechaDesde">
                <label>Hasta:</label>
                <input type="date" id="fechaHasta">
            </div>
        </div>
        
        <div class="chart-container">
            <canvas id="graficaAnalisis"></canvas>
        </div>
    </div>
</div>

<div id="loading" class="loading">
    <p>Cargando...</p>
</div>

<script type="module">
    // Variables globales
    let dbData = [];
    let myChart = null;
    let analisisChart = null;
    let metricaActual = 'instalaciones';
    
    // Elementos DOM
    const loadingDiv = document.getElementById('loading');
    const syncStatus = document.getElementById('sync-status');
    
    function showLoading() { loadingDiv.style.display = 'block'; }
    function hideLoading() { loadingDiv.style.display = 'none'; }
    
    // AUTOCOMPLETADO DE METAS
    async function autoCompletarMetas() {
        const fechaSeleccionada = document.getElementById('reg-fecha').value;
        if(!fechaSeleccionada) return;
        
        try {
            const q = query(collection(db, "kpi_dashboard"), orderBy("fecha", "desc"));
            const querySnapshot = await getDocs(q);
            let ultimoRegistro = null;
            let fechaUltimo = null;
            
            querySnapshot.forEach((doc) => {
                const fechaDoc = doc.data().fecha;
                if(fechaDoc < fechaSeleccionada) {
                    if(!fechaUltimo || fechaDoc > fechaUltimo) {
                        fechaUltimo = fechaDoc;
                        ultimoRegistro = doc.data();
                    }
                }
            });
            
            if(ultimoRegistro) {
                document.getElementById('m-inst').value = ultimoRegistro.obj_inst || 0;
                document.getElementById('m-crec').value = ultimoRegistro.obj_crecimiento || 0;
                document.getElementById('m-bajas').value = ultimoRegistro.obj_bajas || 0;
                document.getElementById('m-perd').value = ultimoRegistro.obj_perdidos || 0;
                console.log("Metas autocompletadas desde:", fechaUltimo);
            }
        } catch (error) {
            console.error("Error en autocompletado:", error);
        }
    }
    
    // CRUD Firebase
    async function cargarDesdeFirebase() {
        showLoading();
        try {
            const q = query(collection(db, "kpi_dashboard"), orderBy("fecha", "desc"));
            const querySnapshot = await getDocs(q);
            dbData = [];
            querySnapshot.forEach((doc) => {
                dbData.push({ id: doc.id, ...doc.data() });
            });
            renderTable();
            hideLoading();
            if(document.getElementById('analisis').classList.contains('active')) {
                actualizarGraficaAnalisis();
            }
            return dbData;
        } catch (error) {
            console.error("Error cargando datos:", error);
            alert("Error al cargar datos: " + error.message);
            hideLoading();
            return [];
        }
    }
    
    async function guardarEnFirebase() {
        const fecha = document.getElementById('reg-fecha').value;
        if(!fecha) return alert("Por favor selecciona una fecha.");
        
        const row = {
            fecha: fecha,
            inst: Number(document.getElementById('r-inst').value || 0),
            obj_inst: Number(document.getElementById('m-inst').value || 0),
            crecimiento: Number(document.getElementById('r-crec').value || 0),
            obj_crecimiento: Number(document.getElementById('m-crec').value || 0),
            bajas: Number(document.getElementById('r-bajas').value || 0),
            obj_bajas: Number(document.getElementById('m-bajas').value || 0),
            perdidos: Number(document.getElementById('r-perd').value || 0),
            obj_perdidos: Number(document.getElementById('m-perd').value || 0)
        };
        
        showLoading();
        try {
            const q = query(collection(db, "kpi_dashboard"));
            const querySnapshot = await getDocs(q);
            let existingDoc = null;
            
            querySnapshot.forEach((doc) => {
                if(doc.data().fecha === fecha) {
                    existingDoc = { id: doc.id, ...doc.data() };
                }
            });
            
            if(existingDoc) {
                const docRef = doc(db, "kpi_dashboard", existingDoc.id);
                await updateDoc(docRef, row);
                alert("¡Registro actualizado correctamente!");
            } else {
                await addDoc(collection(db, "kpi_dashboard"), row);
                alert("¡Registro guardado correctamente!");
            }
            
            await cargarDesdeFirebase();
            
            // Limpiar reales, mantener metas
            document.getElementById('r-inst').value = '';
            document.getElementById('r-crec').value = '';
            document.getElementById('r-bajas').value = '';
            document.getElementById('r-perd').value = '';
            
            hideLoading();
        } catch (error) {
            console.error("Error guardando:", error);
            alert("Error al guardar: " + error.message);
            hideLoading();
        }
    }
    
    async function eliminarRegistro(id) {
        if(confirm("¿Estás seguro de eliminar este registro?")) {
            showLoading();
            try {
                await deleteDoc(doc(db, "kpi_dashboard", id));
                alert("Registro eliminado");
                await cargarDesdeFirebase();
                hideLoading();
            } catch (error) {
                console.error("Error eliminando:", error);
                alert("Error al eliminar: " + error.message);
                hideLoading();
            }
        }
    }
    
    function editarRegistro(registro) {
        document.getElementById('reg-fecha').value = registro.fecha;
        document.getElementById('r-inst').value = registro.inst;
        document.getElementById('m-inst').value = registro.obj_inst;
        document.getElementById('r-crec').value = registro.crecimiento;
        document.getElementById('m-crec').value = registro.obj_crecimiento;
        document.getElementById('r-bajas').value = registro.bajas;
        document.getElementById('m-bajas').value = registro.obj_bajas;
        document.getElementById('r-perd').value = registro.perdidos;
        document.getElementById('m-perd').value = registro.obj_perdidos;
        
        openTab('registro');
    }
    
    function renderTable() {
        const tbody = document.getElementById('cuerpo-tabla');
        const contador = document.getElementById('contador-filas');
        contador.innerHTML = `${dbData.length} Registros`;
        
        tbody.innerHTML = dbData.map(d => `
            <tr>
                <td><strong>${d.fecha}</strong></td>
                <td>${d.inst} <span class="goal-tag">M: ${d.obj_inst}</span></td>
                <td>${d.crecimiento} <span class="goal-tag">M: ${d.obj_crecimiento}</span></td>
                <td>${d.bajas} <span class="goal-tag">M: ${d.obj_bajas}</span></td>
                <td>${d.perdidos} <span class="goal-tag">M: ${d.obj_perdidos}</span></td>
                <td class="action-buttons">
                    <button class="edit-btn" data-registro='${JSON.stringify(d)}'>✏️ Editar</button>
                    <button class="delete-btn" data-id="${d.id}">🗑️ Eliminar</button>
                </td>
            </tr>
        `).join('');
        
        // Agregar event listeners a los botones
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const registro = JSON.parse(btn.getAttribute('data-registro'));
                editarRegistro(registro);
            });
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-id');
                eliminarRegistro(id);
            });
        });
    }
    
    // Importar Excel
    document.getElementById('excel-file').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            showLoading();
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
            let nuevos = 0;
            for(const name of workbook.SheetNames) {
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
                for(const r of json) {
                    let f = r['Fecha'] instanceof Date ? r['Fecha'].toISOString().split('T')[0] : r['Fecha'];
                    if(!f) continue;
                    const data = {
                        fecha: f, inst: Number(r['Instalaciones'] || 0), obj_inst: Number(r['Objetivo Instalación'] || 0),
                        perdidos: Number(r['Clientes Perdidos'] || 0), obj_perdidos: Number(r['Objetivo Clientes Perdidos'] || 0),
                        bajas: Number(r['Bajas Rezagas Canceladas'] || 0), obj_bajas: Number(r['Objetivo Bajas'] || 0),
                        crecimiento: Number(r['Crecimiento'] || 0), obj_crecimiento: Number(r['Objetivo Crecimiento'] || 0)
                    };
                    const q = query(collection(db, "kpi_dashboard"));
                    const snapshot = await getDocs(q);
                    let exists = false;
                    snapshot.forEach((doc) => { if(doc.data().fecha === f) exists = true; });
                    if(!exists) { await addDoc(collection(db, "kpi_dashboard"), data); nuevos++; }
                }
            }
            await cargarDesdeFirebase();
            alert(`Importados ${nuevos} nuevos registros`);
            hideLoading();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });
    
    // Exportar Excel
    function exportarExcel() {
        const exportData = dbData.map(({ id, ...rest }) => rest);
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "KPI_Data");
        XLSX.writeFile(wb, `KPI_Backup_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
    
    // MANEJO DE PESTAÑAS
    function openTab(tabId) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.getAttribute('data-tab') === tabId) {
                btn.classList.add('active');
            }
        });
        
        if(tabId === 'analisis') {
            actualizarGraficaAnalisis();
        }
    }
    
    // COMPARATIVA
    function toggleInputsComparativa() {
        const tipo = document.getElementById('tipo-comp').value;
        document.querySelectorAll('#comparativa .in-dia').forEach(e => e.style.display = tipo === 'dia' ? 'block' : 'none');
        document.querySelectorAll('#comparativa .in-mes').forEach(e => e.style.display = tipo === 'mes' ? 'block' : 'none');
        document.querySelectorAll('#comparativa .in-año').forEach(e => e.style.display = tipo === 'año' ? 'block' : 'none');
    }
    
    function ejecutarComparativa() {
        const tipo = document.getElementById('tipo-comp').value;
        const metrics = ['inst', 'crecimiento', 'bajas', 'perdidos'];
        const labels = ['Instalaciones', 'Crecimiento', 'Bajas', 'C. Perdidos'];
        
        const getUltimoValor = (pref) => {
            const val = document.getElementById(tipo === 'dia' ? 'fecha-'+pref : (tipo === 'mes' ? 'mes-'+pref : 'año-'+pref)).value;
            if(!val) return { real: [0,0,0,0], meta: [0,0,0,0] };
            const filtrados = dbData.filter(d => d.fecha.startsWith(val));
            if(filtrados.length === 0) return { real: [0,0,0,0], meta: [0,0,0,0] };
            filtrados.sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
            const ultimo = filtrados[filtrados.length - 1];
            return { real: metrics.map(m => ultimo[m]), meta: metrics.map(m => ultimo['obj_'+m]) };
        };
        
        const dataA = getUltimoValor('a');
        const dataB = getUltimoValor('b');
        
        if(myChart) myChart.destroy();
        const ctx = document.getElementById('graficaComparativa').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Periodo A (Cierre)', data: dataA.real, backgroundColor: '#2563eb' },
                    { label: 'Meta A', data: dataA.meta, type: 'line', borderColor: '#93c5fd', borderDash: [5, 5], borderWidth: 2, fill: false },
                    { label: 'Periodo B (Cierre)', data: dataB.real, backgroundColor: '#22c55e' },
                    { label: 'Meta B', data: dataB.meta, type: 'line', borderColor: '#86efac', borderDash: [5, 5], borderWidth: 2, fill: false }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
    
    // ANÁLISIS POR MÉTRICA
    function cambiarMetrica(metrica) {
        metricaActual = metrica;
        document.querySelectorAll('.metric-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.metric-btn[data-metrica="${metrica}"]`).classList.add('active');
        actualizarGraficaAnalisis();
    }
    
    function configurarSelectorPeriodo() {
        const selector = document.getElementById('periodoSelector');
        const añoDiv = document.getElementById('añoSelector');
        const rangoDiv = document.getElementById('rangoSelector');
        
        if(selector.value === 'año') {
            añoDiv.style.display = 'flex';
            rangoDiv.style.display = 'none';
        } else if(selector.value === 'rango') {
            añoDiv.style.display = 'none';
            rangoDiv.style.display = 'flex';
        } else {
            añoDiv.style.display = 'none';
            rangoDiv.style.display = 'none';
        }
        actualizarGraficaAnalisis();
    }
    
    function actualizarGraficaAnalisis() {
        if(dbData.length === 0) return;
        
        const agrupacion = document.getElementById('agrupacion').value;
        const periodoSelector = document.getElementById('periodoSelector').value;
        const añoFiltro = parseInt(document.getElementById('añoFiltro').value);
        const fechaDesde = document.getElementById('fechaDesde').value;
        const fechaHasta = document.getElementById('fechaHasta').value;
        
        let campoReal, campoMeta, titulo;
        switch(metricaActual) {
            case 'instalaciones':
                campoReal = 'inst';
                campoMeta = 'obj_inst';
                titulo = 'Instalaciones';
                break;
            case 'crecimiento':
                campoReal = 'crecimiento';
                campoMeta = 'obj_crecimiento';
                titulo = 'Crecimiento';
                break;
            case 'bajas':
                campoReal = 'bajas';
                campoMeta = 'obj_bajas';
                titulo = 'Bajas';
                break;
            case 'perdidos':
                campoReal = 'perdidos';
                campoMeta = 'obj_perdidos';
                titulo = 'Clientes Perdidos';
                break;
            default:
                campoReal = 'inst';
                campoMeta = 'obj_inst';
                titulo = 'Instalaciones';
        }
        
        let datosFiltrados = dbData.map(d => ({
            fecha: d.fecha,
            valor: d[campoReal],
            meta: d[campoMeta]
        }));
        
        if(periodoSelector === 'año' && añoFiltro) {
            datosFiltrados = datosFiltrados.filter(d => d.fecha.startsWith(añoFiltro.toString()));
        } else if(periodoSelector === 'rango' && fechaDesde && fechaHasta) {
            datosFiltrados = datosFiltrados.filter(d => d.fecha >= fechaDesde && d.fecha <= fechaHasta);
        }
        
        if(datosFiltrados.length === 0) {
            if(analisisChart) analisisChart.destroy();
            return;
        }
        
        const gruposReales = {};
        const gruposMetas = {};
        
        datosFiltrados.forEach(item => {
            const fecha = new Date(item.fecha);
            let key;
            if(agrupacion === 'dia') {
                key = item.fecha;
            } else if(agrupacion === 'mes') {
                key = `${fecha.getFullYear()}-${String(fecha.getMonth()+1).padStart(2,'0')}`;
            } else {
                key = `${fecha.getFullYear()}`;
            }
            
            if(!gruposReales[key]) {
                gruposReales[key] = 0;
                gruposMetas[key] = 0;
            }
            gruposReales[key] += item.valor;
            gruposMetas[key] = item.meta;
        });
        
        const periodos = Object.keys(gruposReales).sort();
        const valoresReales = periodos.map(p => gruposReales[p]);
        const valoresMetas = periodos.map(p => {
            const itemsPeriodo = datosFiltrados.filter(d => {
                const fecha = new Date(d.fecha);
                let key;
                if(agrupacion === 'dia') key = d.fecha;
                else if(agrupacion === 'mes') key = `${fecha.getFullYear()}-${String(fecha.getMonth()+1).padStart(2,'0')}`;
                else key = `${fecha.getFullYear()}`;
                return key === p;
            });
            if(itemsPeriodo.length > 0) {
                return itemsPeriodo[itemsPeriodo.length-1].meta;
            }
            return 0;
        });
        
        if(analisisChart) analisisChart.destroy();
        const ctx = document.getElementById('graficaAnalisis').getContext('2d');
        
        analisisChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: periodos,
                datasets: [
                    { label: `${titulo} (Real)`, data: valoresReales, backgroundColor: '#2563eb', borderRadius: 8 },
                    { label: `${titulo} (Meta)`, data: valoresMetas, type: 'line', borderColor: '#f59e0b', borderWidth: 3, fill: false, tension: 0.1, pointRadius: 5, pointBackgroundColor: '#f59e0b' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: { mode: 'index', intersect: false },
                    legend: { position: 'top' },
                    title: { display: true, text: `${titulo} - Agrupado por ${agrupacion === 'dia' ? 'Día' : (agrupacion === 'mes' ? 'Mes' : 'Año')}`, font: { size: 16 } }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: titulo } },
                    x: { title: { display: true, text: agrupacion === 'dia' ? 'Fecha' : (agrupacion === 'mes' ? 'Mes' : 'Año') } }
                }
            }
        });
    }
    
    // EVENT LISTENERS
    document.getElementById('reg-fecha').addEventListener('change', autoCompletarMetas);
    document.getElementById('btnGuardar').addEventListener('click', guardarEnFirebase);
    document.getElementById('btnCargar').addEventListener('click', cargarDesdeFirebase);
    document.getElementById('btnExportar').addEventListener('click', exportarExcel);
    document.getElementById('btnComparar').addEventListener('click', ejecutarComparativa);
    document.getElementById('tipo-comp').addEventListener('change', toggleInputsComparativa);
    document.getElementById('agrupacion').addEventListener('change', actualizarGraficaAnalisis);
    document.getElementById('periodoSelector').addEventListener('change', configurarSelectorPeriodo);
    document.getElementById('añoFiltro').addEventListener('change', actualizarGraficaAnalisis);
    document.getElementById('fechaDesde').addEventListener('change', actualizarGraficaAnalisis);
    document.getElementById('fechaHasta').addEventListener('change', actualizarGraficaAnalisis);
    
    // Event listeners para pestañas
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            openTab(tabId);
        });
    });
    
    // Event listeners para botones de métrica
    document.querySelectorAll('.metric-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const metrica = btn.getAttribute('data-metrica');
            cambiarMetrica(metrica);
        });
    });
    
    // Inicialización
    document.getElementById('reg-fecha').value = new Date().toISOString().split('T')[0];
    document.getElementById('añoFiltro').value = new Date().getFullYear();
    configurarSelectorPeriodo();
    
    // Cargar datos después de autenticación
    const checkAuth = setInterval(() => {
        if(window.db) {
            clearInterval(checkAuth);
            cargarDesdeFirebase();
        }
    }, 500);
</script>
</body>
